name: Pull LFS objects (cached)
description: Cache and pull Git LFS objects. Requires the repo to already be checked out.

runs:
  using: composite
  steps:
    - name: Set up Git LFS
      shell: bash
      run: git lfs install --local

    - name: Create LFS file list
      shell: bash
      run: git lfs ls-files --long | cut -d ' ' -f1 | sort > .lfs-assets-id

    - name: Cache LFS objects
      uses: actions/cache@v4
      with:
        path: .git/lfs
        key: lfs-${{ hashFiles('.lfs-assets-id') }}-v1

    - name: Pull LFS objects
      shell: bash
      run: git lfs pull
