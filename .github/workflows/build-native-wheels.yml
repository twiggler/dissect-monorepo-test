# Reusable workflow — build native (Rust) wheels via cibuildwheel across all platforms.
#
# Callers control two knobs:
#   include-slow-arches — when true, builds QEMU-emulated arches (i686, ppc64le, s390x,
#                         armv7l) in addition to x86_64. The full arch list is read from
#                         [tool.monorepo.native] in pyproject.toml. Use false for fast
#                         push/PR builds (host-only, no QEMU).
#   upload-artifacts    — upload built wheels as GitHub Actions artifacts so a
#                         subsequent publish job can collect and upload them to PyPI.
#
# The build matrix is generated dynamically: each Linux x86 arch gets its own runner
# so that QEMU-emulated builds run in parallel rather than sequentially.


on:
  workflow_call:
    inputs:
      include-slow-arches:
        description: >
          Build QEMU-emulated Linux x86 arches (i686, ppc64le, s390x, armv7l) in
          addition to the native x86_64. Uses [tool.monorepo.native.linux-x86-archs]
          from pyproject.toml when true, linux-x86-archs-pr when false.
        type: boolean
        default: false
      packages:
        description: "Space-separated package names to build, or 'all' to build every native package."
        type: string
        default: all
      upload-artifacts:
        description: "Upload built wheels as GitHub Actions artifacts for a subsequent publish job."
        type: boolean
        default: false

permissions: {}

jobs:
  # Generate the build matrix. Linux x86 arches are split one-per-runner (parallel QEMU).
  # All other platforms are static entries appended by the script.
  generate-matrix:
    name: Generate matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate build matrix
        id: gen
        env:
          SLOW_FLAG: ${{ inputs.include-slow-arches && '--slow' || '' }}
        run: python3 .monorepo/resolve_linux_archs.py $SLOW_FLAG

  build:
    name: Build / ${{ matrix.platform }}
    needs: generate-matrix
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.generate-matrix.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: ./.github/actions/lfs-pull

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0

      - name: Set up QEMU
        if: matrix.needs-qemu == 'true'
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        with:
          platforms: ${{ matrix.qemu-platform }}

      - name: Install bash 5 (macOS)
        if: runner.os == 'macOS'
        run: brew install bash

      - name: Build native wheels
        env:
          PACKAGES: ${{ inputs.packages }}
        shell: bash
        run: just test-native-wheels "${{ matrix.archs }}" "$PACKAGES"

      - name: Upload wheels
        if: inputs.upload-artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-${{ matrix.platform }}
          path: dist/
          if-no-files-found: error
